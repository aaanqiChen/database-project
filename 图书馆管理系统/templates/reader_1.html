<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System - Reader Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-image: url('reader_1.png'); /* 替换为您的背景图片URL */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            font-family: 'Brush Script MT', cursive; /* 艺术体 */
            font-size: 3em;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .container {
            display: flex;
            flex: 1;
            padding: 20px;
        }

        .menu {
            width: 200px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .menu button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 4px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }

        .menu button:hover {
            background-color: #45a049;
        }

        .panel {
            flex: 1;
            margin-left: 20px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .info-item {
            margin-bottom: 15px;
        }

        .info-item label {
            display: inline-block;
            width: 120px;
            font-weight: bold;
        }

        .info-item textarea {
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 100%;
            height: 100px;
            resize: vertical; /* 允许垂直调整大小 */
        }

        .button-group {
            margin-top: 15px;
        }

        .button-group button {
            padding: 8px 15px;
            margin-right: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .button-group button[type="button"] {
            background-color: #2196F3;
            color: white;
        }

        .button-group button[type="submit"] {
            background-color: #4CAF50;
            color: white;
        }

        .button-group button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="header">图书馆</div>
    <div class="container">
        <div class="menu">
            <button onclick="navigateTo('search')">图书检索</button>
            <button onclick="navigateTo('records')">借阅记录</button>
            <button onclick="navigateTo('fines')">罚款记录</button>
        </div>
        <div class="panel">
            <div class="info-item">
                <label for="username">用户名：</label>
                <span id="username">张三</span>
            </div>
            <div class="info-item">
                <label for="bio">简介：</label>
                <textarea id="bio" name="bio" disabled>这里是用户的简介信息</textarea>
                <div class="button-group">
                    <button type="button" onclick="editBio()">编辑</button>
                    <button type="submit" onclick="saveBio()">确定</button>
                </div>
            </div>
            <div class="info-item">
                <label for="books-available">可借书籍数目：</label>
                <span id="books-available">5</span>
            </div>
            <div class="info-item">
                <label for="credit-record">信用记录：</label>
                <span id="credit-record">良好</span>
            </div>
        </div>
    </div>

    <script>
        function navigateTo(page) {
            alert('跳转到 ' + page + ' 页面');
        }

        function editBio() {
            const bioTextarea = document.getElementById('bio');
            bioTextarea.disabled = false;
        }

        function saveBio() {
            const bioTextarea = document.getElementById('bio');
            bioTextarea.disabled = true;
            alert('简介已保存');
        }
    </script>
</body>
</html>
