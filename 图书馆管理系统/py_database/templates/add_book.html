<div class="add-book">
    <h3>增加图书</h3>
    <form id="addBookForm">
        <label for="book_name">书名：</label>
        <input type="text" id="book_name" name="book_name" required><br>
        <label for="book_writer">作者：</label>
        <input type="text" id="book_writer" name="book_writer" required><br>
        <label for="publisher">出版社：</label>
        <input type="text" id="publisher" name="publisher" required><br>
        <label for="publish_data">出版日期：</label>
        <input type="date" id="publish_data" name="publish_data" required><br>
        <label for="price">价格：</label>
        <input type="number" step="0.01" id="price" name="price" required><br>
        <label for="bookcase">书架：</label>
        <input type="text" id="bookcase" name="bookcase" required><br>
        <label for="language">语言：</label>
        <input type="text" id="language" name="language" required><br>
        <label for="brief_intro">简介：</label>
        <textarea id="brief_intro" name="brief_intro" required></textarea><br>
        <label for="total_amount">总量：</label>
        <input type="number" id="total_amount" name="total_amount" required><br>
        <label for="category">种类：</label>
        <input type="text" id="category" name="category" required><br>

        <button type="submit">提交</button>
    </form>
    <div id="message" style="margin-top: 10px; color: green;"></div>
</div>

<script>
document.getElementById('addBookForm').addEventListener('submit', function(e) {
    e.preventDefault(); // 阻止表单默认提交行为

    const formData = new FormData(this);

    fetch('/add_book2', {
        method: 'POST',
        body: formData
    })
    .then(response => response.text())
    .then(data => {
        document.getElementById('message').textContent = '添加成功';
        this.reset(); // 清空表单
        setTimeout(() => {
            document.getElementById('message').textContent = '';
        }, 2000); // 2秒后消失
    })
    .catch(error => {
        console.error('Error:', error);
        document.getElementById('message').textContent = '添加失败';
        document.getElementById('message').style.color = 'red';
    });
});
</script>
