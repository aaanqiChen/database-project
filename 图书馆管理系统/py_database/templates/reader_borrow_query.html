<div class="reader_borrow_query">
    <h2>借阅记录</h2>
    <ul id="borrow-list">
        {% for record in borrow_records %}
        <li>
            <span>书名: {{ record.book_name }} </span>
            <span>借阅日期: {{ record.borrow_date }} </span>
            <span>应还日期: {{ record.due_date }} </span>
            <span>借阅状态: {{ record.state }} </span>
            <button onclick="returnBook('{{ record.borrow_id }}')">还书</button>
        </li>
        {% endfor %}
    </ul>
</div>
